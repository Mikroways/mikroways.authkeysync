# defaults/main.yml
---
# AuthKeySync version to install. Pinned for reproducibility and so Renovate
# keeps it up to date (see renovate.json5). Use "latest" to always follow the
# newest release.
# renovate: datasource=github-releases depName=eduardolat/authkeysync
authkeysync_version: v0.1.1
# Binary architecture (amd64 | arm64).
authkeysync_arch: amd64
authkeysync_download_url: >-
  https://github.com/eduardolat/authkeysync/releases/{{
  'latest/download' if authkeysync_version == 'latest'
  else 'download/' + authkeysync_version }}/authkeysync-linux-{{ authkeysync_arch }}

# User-level install: the role does NOT use become. It installs under the HOME
# of the user running the role and syncs that same user's authorized_keys.
# Creating the user is a previous step (cloud-init, etc.).
authkeysync_bin_dir: "{{ ansible_env.HOME }}/.local/bin"
authkeysync_bin_path: "{{ authkeysync_bin_dir }}/authkeysync"
authkeysync_config_dir: "{{ ansible_env.HOME }}/.config/authkeysync"
authkeysync_config_path: "{{ authkeysync_config_dir }}/config.yaml"

# Sync policy.
authkeysync_backup_enabled: true
authkeysync_backup_retention_count: 10
# IMPORTANT: strict by design. With preserve_local_keys=false the
# authorized_keys file stays EXACTLY equal to the source: keys no longer present
# in the source (e.g. someone who left Mikroways) are removed.
# AuthKeySync uses no markers: in strict mode any local key not in a source is
# deleted. Make sure the source contains every legitimate key, or have an
# alternative access path (console/Teleport, or the initial key injected by
# cloud-init also published in the source). Backups stay enabled.
authkeysync_preserve_local_keys: false

# Sync cron frequency (the user's own crontab).
authkeysync_cron_minute: "*/5"
# Run an initial sync when applying the role.
authkeysync_run_initial_sync: true

# Mikroways team keys source (public keys repo).
authkeysync_mikroways_keys_url: "https://mikroways.gitlab.io/public/ssh_keys/_all.pub"

# Target user: by default, the user running the role.
authkeysync_username: "{{ ansible_user_id }}"
# Key sources to sync for that user. AuthKeySync supports several
# (e.g. team keys + the client's own keys from another URL).
authkeysync_sources:
  - url: "{{ authkeysync_mikroways_keys_url }}"
