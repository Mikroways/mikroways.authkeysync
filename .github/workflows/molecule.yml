---
name: molecule

on:
  pull_request:
    branches: [main, master]
  push:
    # Solo tags semver (X.Y.Z) y prerelease (X.Y.Z-algo, ej. 0.1.0-test).
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

# Dentro de un mismo PR (o ref), un push nuevo cancela el run anterior:
# no se apilan ni se pisan.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Checkout into a directory named after the role so that
      # `include_role: name: mikroways.authkeysync` resolves via roles_path (..).
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: mikroways.authkeysync

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        working-directory: mikroways.authkeysync
        run: uv sync

      - name: Lint
        working-directory: mikroways.authkeysync
        run: |
          uv run yamllint .
          uv run ansible-lint .

      - name: Molecule test
        working-directory: mikroways.authkeysync
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}
        run: uv run molecule test --all
