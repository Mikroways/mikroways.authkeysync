---
name: molecule

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Checkout into a directory named after the role so that
      # `include_role: name: mikroways.authkeysync` resolves via roles_path (..).
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: mikroways.authkeysync

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        working-directory: mikroways.authkeysync
        run: uv sync

      - name: Molecule test
        working-directory: mikroways.authkeysync
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}
        run: uv run molecule test
