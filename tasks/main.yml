# tasks/main.yml
---
# No become: everything is installed under the home of the user running the role.
- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ authkeysync_bin_dir }}"
    state: directory
    mode: "0755"

- name: Download AuthKeySync binary
  ansible.builtin.get_url:
    url: "{{ authkeysync_download_url }}"
    dest: "{{ authkeysync_bin_path }}"
    mode: "0755"
  environment:
    http_proxy: "{{ authkeysync_http_proxy }}"
    https_proxy: "{{ authkeysync_https_proxy }}"
    no_proxy: "{{ authkeysync_no_proxy }}"

- name: Ensure configuration directory exists
  ansible.builtin.file:
    path: "{{ authkeysync_config_dir }}"
    state: directory
    mode: "0755"

# AuthKeySync skips the user if their ~/.ssh does not exist (it does not create it).
- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ authkeysync_ssh_dir }}"
    state: directory
    mode: "0700"

- name: Deploy AuthKeySync configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ authkeysync_config_path }}"
    mode: "0644"
  notify: Run AuthKeySync sync

- name: Set http_proxy for cron
  ansible.builtin.cron:
    name: http_proxy
    env: true
    value: "{{ authkeysync_http_proxy }}"
    state: "{{ 'present' if authkeysync_http_proxy else 'absent' }}"

- name: Set https_proxy for cron
  ansible.builtin.cron:
    name: https_proxy
    env: true
    value: "{{ authkeysync_https_proxy }}"
    state: "{{ 'present' if authkeysync_https_proxy else 'absent' }}"

- name: Set no_proxy for cron
  ansible.builtin.cron:
    name: no_proxy
    env: true
    value: "{{ authkeysync_no_proxy }}"
    state: "{{ 'present' if authkeysync_no_proxy else 'absent' }}"

- name: Schedule AuthKeySync cron job
  ansible.builtin.cron:
    name: AuthKeySync
    minute: "{{ authkeysync_cron_minute }}"
    job: "{{ authkeysync_bin_path }} --config {{ authkeysync_config_path }} --quiet"

- name: Run initial AuthKeySync sync
  ansible.builtin.command: "{{ authkeysync_bin_path }} --config {{ authkeysync_config_path }} --quiet"
  changed_when: false
  environment:
    http_proxy: "{{ authkeysync_http_proxy }}"
    https_proxy: "{{ authkeysync_https_proxy }}"
    no_proxy: "{{ authkeysync_no_proxy }}"
  when: authkeysync_run_initial_sync | bool
