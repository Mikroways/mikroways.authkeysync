---
- name: Install and start tinyproxy
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Install tinyproxy
      ansible.builtin.apt:
        name: tinyproxy
        state: present
        update_cache: true

    - name: Allow connections from localhost in tinyproxy
      ansible.builtin.lineinfile:
        path: /etc/tinyproxy/tinyproxy.conf
        regexp: '^#?Allow '
        line: "Allow 127.0.0.1"
        state: present

    - name: Check if tinyproxy is already running
      ansible.builtin.command: pgrep tinyproxy
      register: tinyproxy_pgrep
      changed_when: false
      failed_when: false

    - name: Start tinyproxy in background
      ansible.builtin.shell: "tinyproxy -c /etc/tinyproxy/tinyproxy.conf"
      args:
        executable: /bin/bash
      changed_when: true
      when: tinyproxy_pgrep.rc != 0

    - name: Wait for tinyproxy to be ready
      ansible.builtin.wait_for:
        port: 8888
        host: 127.0.0.1
        timeout: 10

- name: Converge with proxy
  hosts: all
  become: false
  gather_facts: true
  roles:
    - role: mikroways.authkeysync
      vars:
        authkeysync_http_proxy: "http://127.0.0.1:8888"
        authkeysync_https_proxy: "http://127.0.0.1:8888"
