---
- name: Verify
  hosts: all
  gather_facts: true
  become: false
  vars:
    authkeysync_bin_path: "{{ ansible_env.HOME }}/.local/bin/authkeysync"
    authkeysync_config_path: "{{ ansible_env.HOME }}/.config/authkeysync/config.yaml"
  tasks:
    - name: Verify AuthKeySync binary is installed and executable
      ansible.builtin.command: "{{ authkeysync_bin_path }} --version"
      changed_when: false

    - name: Verify authorized_keys exists and is not empty
      ansible.builtin.command: "grep -c . {{ ansible_env.HOME }}/.ssh/authorized_keys"
      register: ak_count
      changed_when: false
      failed_when: ak_count.rc != 0 or ak_count.stdout | int == 0

    - name: Verify crontab has http_proxy set
      ansible.builtin.command: "crontab -l"
      register: user_crontab
      changed_when: false
      failed_when: "'http_proxy' not in user_crontab.stdout"

    - name: Verify crontab has https_proxy set
      ansible.builtin.assert:
        that: "'https_proxy' in user_crontab.stdout"
        fail_msg: "https_proxy not found in crontab"

    - name: Verify crontab proxy values point to tinyproxy
      ansible.builtin.assert:
        that:
          - "'127.0.0.1:8888' in user_crontab.stdout"
        fail_msg: "proxy URL not found in crontab"
