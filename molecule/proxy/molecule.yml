---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: authkeysync-proxy
    image: ubuntu:24.04
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        ansible_user: ansible
verifier:
  name: ansible
scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
